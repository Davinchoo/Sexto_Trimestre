<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>

    <h2>Formulario de Registro</h2>

    <form action="#" method="post">

        <!-- Nombre completo -->
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <!-- Número de identificación -->
        <label for="identificacion">Número de identificación:</label><br>
        <input type="number" id="identificacion" name="identificacion" required><br><br>

        <!-- Fecha de nacimiento -->
        <label for="fecha">Fecha de nacimiento:</label><br>
        <input type="date" id="fecha" name="fecha" required><br><br>

        <!-- Estado civil -->
        <label>Estado civil:</label><br>
        <input type="radio" id="soltero" name="estado_civil" value="soltero" required>
        <label for="soltero">Soltero</label><br>

        <input type="radio" id="casado" name="estado_civil" value="casado">
        <label for="casado">Casado</label><br><br>

        <!-- Política de datos -->
        <input type="checkbox" id="politica" name="politica" required>
        <label for="politica">Acepto la política de tratamiento de datos</label><br><br>

        <!-- Botón -->
        <button type="submit">Enviar</button>

    </form>

</body>
</html>
